<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'">
  <title>gMessages Settings</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f5f5f5;
      --surface: #ffffff;
      --text: #1a1a1a;
      --text-muted: #666666;
      --border: #e0e0e0;
      --accent: #1a73e8;
      --accent-hover: #1557b0;
      --scrollbar-thumb: rgba(0, 0, 0, 0.22);
      --scrollbar-thumb-hover: rgba(0, 0, 0, 0.38);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1e1e1e;
        --surface: #2d2d2d;
        --text: #e8e8e8;
        --text-muted: #a0a0a0;
        --border: #404040;
        --accent: #8ab4f8;
        --accent-hover: #aecbfa;
        --scrollbar-thumb: rgba(255, 255, 255, 0.22);
        --scrollbar-thumb-hover: rgba(255, 255, 255, 0.38);
      }
    }

    html {
      height: 100%;
    }

    html,
    body {
      scrollbar-width: thin;
      scrollbar-color: var(--scrollbar-thumb) transparent;
    }

    html::-webkit-scrollbar,
    body::-webkit-scrollbar {
      width: 8px;
    }

    html::-webkit-scrollbar-track,
    body::-webkit-scrollbar-track {
      background: transparent;
    }

    html::-webkit-scrollbar-thumb,
    body::-webkit-scrollbar-thumb {
      background-color: var(--scrollbar-thumb);
      border-radius: 999px;
      border: 2px solid transparent;
      background-clip: padding-box;
    }

    html::-webkit-scrollbar-thumb:hover,
    body::-webkit-scrollbar-thumb:hover {
      background-color: var(--scrollbar-thumb-hover);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      background: var(--bg);
      color: var(--text);
      min-height: 100%;
      padding: 24px;
      overflow-x: hidden;
      overflow-y: auto;
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .subtitle {
      color: var(--text-muted);
      margin-bottom: 24px;
    }

    .settings-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .setting {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
    }

    .setting-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .setting-label {
      font-weight: 500;
    }

    .setting-description {
      color: var(--text-muted);
      font-size: 13px;
      margin-top: 4px;
    }

    .setting-control {
      margin-top: 12px;
    }

    select {
      width: 100%;
      padding: 8px 12px;
      font-size: 14px;
      font-family: inherit;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
      color: var(--text);
      scrollbar-width: thin;
      scrollbar-color: var(--scrollbar-thumb) transparent;
    }

    select::-webkit-scrollbar {
      width: 8px;
    }

    select::-webkit-scrollbar-thumb {
      background-color: var(--scrollbar-thumb);
      border-radius: 999px;
    }

    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
      flex-shrink: 0;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 24px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      left: 3px;
      bottom: 3px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .toggle input:checked + .toggle-slider {
      background: var(--accent);
    }

    .toggle input:checked + .toggle-slider::before {
      transform: translateX(20px);
    }

    .toggle input:focus-visible + .toggle-slider {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .status {
      margin-top: 16px;
      font-size: 13px;
      color: var(--text-muted);
      min-height: 20px;
    }

    .status.saved {
      color: #188038;
    }

    @media (prefers-color-scheme: dark) {
      .status.saved {
        color: #81c995;
      }
    }
  </style>
</head>
<body>
  <h1>gMessages Settings</h1>
  <p class="subtitle">Changes are saved automatically. Unofficial wrapper — not affiliated with Google.</p>

  <div id="settings" class="settings-list"></div>
  <div id="status" class="status"></div>

  <script src="settings.js"></script>
</body>
</html>
