<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'">
  <title>gMessages Settings</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f5f5f5;
      --surface: #ffffff;
      --text: #1a1a1a;
      --text-muted: #666666;
      --border: #e0e0e0;
      --accent: #1a73e8;
      --accent-hover: #1557b0;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1e1e1e;
        --surface: #2d2d2d;
        --text: #e8e8e8;
        --text-muted: #a0a0a0;
        --border: #404040;
        --accent: #8ab4f8;
        --accent-hover: #aecbfa;
      }
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      background: var(--bg);
      color: var(--text);
      padding: 24px;
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .subtitle {
      color: var(--text-muted);
      margin-bottom: 24px;
    }

    .settings-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .setting {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
    }

    .setting-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .setting-label {
      font-weight: 500;
    }

    .setting-description {
      color: var(--text-muted);
      font-size: 13px;
      margin-top: 4px;
    }

    .setting-control {
      margin-top: 12px;
    }

    select {
      width: 100%;
      padding: 8px 12px;
      font-size: 14px;
      font-family: inherit;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
      color: var(--text);
    }

    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
      flex-shrink: 0;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 24px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      left: 3px;
      bottom: 3px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .toggle input:checked + .toggle-slider {
      background: var(--accent);
    }

    .toggle input:checked + .toggle-slider::before {
      transform: translateX(20px);
    }

    .toggle input:focus-visible + .toggle-slider {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .status {
      margin-top: 16px;
      font-size: 13px;
      color: var(--text-muted);
      min-height: 20px;
    }

    .status.saved {
      color: #188038;
    }

    @media (prefers-color-scheme: dark) {
      .status.saved {
        color: #81c995;
      }
    }
  </style>
</head>
<body>
  <h1>gMessages Settings</h1>
  <p class="subtitle">Changes are saved automatically.</p>

  <div id="settings" class="settings-list"></div>
  <div id="status" class="status"></div>

  <script>
    const settingsEl = document.getElementById('settings');
    const statusEl = document.getElementById('status');
    let saveTimer = null;

    function showStatus(message) {
      statusEl.textContent = message;
      statusEl.classList.add('saved');
      clearTimeout(saveTimer);
      saveTimer = setTimeout(() => {
        statusEl.textContent = '';
        statusEl.classList.remove('saved');
      }, 2000);
    }

    function createToggle(key, def, value) {
      const label = document.createElement('label');
      label.className = 'toggle';
      label.innerHTML = `
        <input type="checkbox" data-key="${key}" ${value ? 'checked' : ''}>
        <span class="toggle-slider"></span>
      `;
      label.querySelector('input').addEventListener('change', (e) => {
        saveSetting(key, e.target.checked);
      });
      return label;
    }

    function createSelect(key, def, value) {
      const select = document.createElement('select');
      select.dataset.key = key;
      for (const opt of def.options) {
        const option = document.createElement('option');
        option.value = opt.value;
        option.textContent = opt.label;
        option.selected = opt.value === value;
        select.appendChild(option);
      }
      select.addEventListener('change', (e) => {
        saveSetting(key, e.target.value);
      });
      return select;
    }

    function renderSetting(key, def, value) {
      const article = document.createElement('article');
      article.className = 'setting';

      const header = document.createElement('div');
      header.className = 'setting-header';

      const text = document.createElement('div');
      const labelEl = document.createElement('div');
      labelEl.className = 'setting-label';
      labelEl.textContent = def.label;
      text.appendChild(labelEl);

      if (def.description) {
        const desc = document.createElement('div');
        desc.className = 'setting-description';
        desc.textContent = def.description;
        text.appendChild(desc);
      }

      header.appendChild(text);

      if (def.type === 'toggle') {
        header.appendChild(createToggle(key, def, value));
      }

      article.appendChild(header);

      if (def.type === 'select') {
        const control = document.createElement('div');
        control.className = 'setting-control';
        control.appendChild(createSelect(key, def, value));
        article.appendChild(control);
      }

      return article;
    }

    async function saveSetting(key, value) {
      try {
        await window.settingsAPI.set(key, value);
        showStatus('Saved');
      } catch (err) {
        statusEl.textContent = 'Failed to save';
        statusEl.classList.remove('saved');
        console.error(err);
      }
    }

    async function loadSettings() {
      const { settings, defs } = await window.settingsAPI.getAll();
      settingsEl.innerHTML = '';

      for (const [key, def] of Object.entries(defs)) {
        settingsEl.appendChild(renderSetting(key, def, settings[key]));
      }
    }

    loadSettings();
  </script>
</body>
</html>
