name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  check:
    name: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run lint

      - name: Syntax check
        run: |
          find src ui -type f \( -name '*.js' -o -name '*.cjs' \) -print0 |
            xargs -0 -I{} node --check {}

  build-platform:
    name: build-${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run build:dir:${{ matrix.platform }}

  build:
    name: build
    needs: build-platform
    runs-on: ubuntu-latest
    if: ${{ always() && needs.build-platform.result == 'success' }}
    steps:
      - run: echo "All platform builds passed"
